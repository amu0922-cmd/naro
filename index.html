<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaroReader</title>
<style>
  :root{--bg:#faf8f5;--bg2:#f2ede6;--surface:#fff;--border:#e0d9cf;--accent:#7c5cbf;--accent-light:#ede8f8;--text:#1c1a22;--text2:#6b6478;--text3:#9b92a8;--tag-bg:#ede8f8;--tag-text:#5a3fa0;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08);--fs:16px;--lh:2.0;--ff:"Hiragino Mincho ProN","游明朝",Georgia,serif}
  [data-theme=dark]{--bg:#12101a;--bg2:#1e1b2a;--surface:#24203a;--border:#38334d;--accent:#9d7de8;--accent-light:#2a2445;--text:#f0ecfa;--text2:#b0a8c8;--text3:#6e6585;--tag-bg:#2a2445;--tag-text:#c4aaf5}
  [data-theme=sepia]{--bg:#f5f0e8;--bg2:#ede5d8;--surface:#faf6ee;--border:#d4c8b0;--accent:#8b6a3e;--accent-light:#f0e8d8;--text:#3a2e1e;--text2:#7a6a50;--text3:#a09080;--tag-bg:#e8dcc8;--tag-text:#6a5030}
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:var(--fs)}
  body{font-family:"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
  .header{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 8px rgba(0,0,0,.06)}
  .logo{font-size:1.2rem;font-weight:800;color:var(--accent);letter-spacing:-.03em}
  .logo span{color:var(--text2);font-weight:400;font-size:.75rem;margin-left:4px}
  .ib{background:none;border:none;cursor:pointer;color:var(--text2);font-size:1.2rem;padding:6px;border-radius:8px;display:flex;align-items:center;justify-content:center;min-width:36px;min-height:36px}
  .ml{margin-left:auto}
  .bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom)}
  .ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:.65rem;gap:3px}
  .ni .icon{font-size:1.3rem}
  .ni.active{color:var(--accent)}
  .page{display:none;padding-bottom:70px}
  .page.active{display:block}
  #pd.active,#pr.active{display:flex;flex-direction:column}
  .sh{background:var(--bg2);padding:16px;border-bottom:1px solid var(--border)}
  .sbar{display:flex;gap:8px;margin-bottom:12px}
  .si{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:.95rem;outline:none}
  .si:focus{border-color:var(--accent)}
  .sbtn{padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer}
  .fr{display:flex;gap:8px;flex-wrap:wrap}
  .fs{padding:6px 10px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text);font-size:.8rem;cursor:pointer;outline:none}
  .gtabs{display:flex;overflow-x:auto;gap:6px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);scrollbar-width:none}
  .gtabs::-webkit-scrollbar{display:none}
  .gt{white-space:nowrap;padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text2);font-size:.78rem;font-weight:600;cursor:pointer;flex-shrink:0}
  .gt.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .nlist{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
  .nc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;box-shadow:var(--shadow)}
  .nch{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
  .nt{font-size:.95rem;font-weight:700;line-height:1.4;flex:1}
  .fb{background:none;border:none;cursor:pointer;font-size:1.2rem;flex-shrink:0;padding:2px}
  .na{font-size:.75rem;color:var(--text2);margin-bottom:8px}
  .ns{font-size:.8rem;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
  .ntags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
  .tag{padding:2px 8px;background:var(--tag-bg);color:var(--tag-text);border-radius:20px;font-size:.7rem;font-weight:600}.stag{cursor:pointer;transition:opacity .15s}.stag:active{opacity:.6}
  .nm{display:flex;gap:10px;font-size:.72rem;color:var(--text3);flex-wrap:wrap}
  .cb{padding:1px 7px;background:#e8f5e9;color:#2e7d32;border-radius:10px;font-size:.68rem;font-weight:700}
  [data-theme=dark] .cb{background:#1b3a1e;color:#66bb6a}
  .wb{padding:1px 7px;background:#fff3e0;color:#e65100;border-radius:10px;font-size:.68rem;font-weight:700}
  [data-theme=dark] .wb{background:#3a2200;color:#ffa726}
  .ld{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;color:var(--text2)}
  .sp{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .em{text-align:center;padding:60px 20px;color:var(--text3);font-size:.9rem;line-height:2}
  .dh,.rh{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px}
  .db{padding:20px 16px}
  .dt{font-size:1.2rem;font-weight:800;margin-bottom:6px;line-height:1.4}
  .dau{font-size:.85rem;color:var(--text2);margin-bottom:14px}
  .dbadge{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .dsum{font-size:.88rem;color:var(--text2);line-height:1.7;background:var(--bg2);border-radius:10px;padding:14px;margin-bottom:14px}
  .dstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
  .sb{background:var(--bg2);border-radius:10px;padding:10px;text-align:center}
  .sn{font-size:1.1rem;font-weight:800;color:var(--accent)}
  .sl{font-size:.68rem;color:var(--text3);margin-top:2px}
  .dtags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
  .rbtn{display:block;width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:1rem;font-weight:700;cursor:pointer;text-align:center;margin-bottom:10px}
  .rbtn2{background:var(--bg2);color:var(--text2)}
  .elt{font-size:.85rem;font-weight:700;color:var(--text2);margin-bottom:10px;margin-top:16px}
  .elist{display:flex;flex-direction:column;gap:4px}
  .ei{padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
  .ei.cur{border-color:var(--accent);color:var(--accent);font-weight:600}
  .enum{font-size:.72rem;color:var(--text3);margin-right:8px;flex-shrink:0}
  .ejump{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  .ejump input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:.9rem;outline:none}
  .ejump input:focus{border-color:var(--accent)}
  .ejump button{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer}
  .rt{flex:1;font-size:.85rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .enav{background:var(--bg2);padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .eb{padding:6px 14px;background:var(--accent-light);color:var(--accent);border:none;border-radius:20px;font-size:.8rem;font-weight:600;cursor:pointer}
  .eb:disabled{opacity:.4;cursor:default}
  .rc{padding:20px 20px 40px;font-family:var(--ff);font-size:var(--fs);line-height:var(--lh);max-width:680px;margin:0 auto;width:100%}
  .etbar{font-size:1rem;font-weight:700;margin-bottom:24px;color:var(--accent);border-left:3px solid var(--accent);padding-left:12px;line-height:1.4}
  .bbar{background:var(--bg2);padding:8px 16px;border-bottom:1px solid var(--border);font-size:.75rem;color:var(--text2)}
  .dro{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:none;align-items:flex-end}
  .dro.open{display:flex}
  .drw{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-height:90vh;overflow-y:auto}
  .drh{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
  .drt{font-size:1rem;font-weight:800;margin-bottom:20px}
  .ss{margin-bottom:20px}
  .sl2{font-size:.78rem;color:var(--text2);font-weight:600;margin-bottom:10px}
  .to,.lho{display:flex;gap:8px}
  .tb,.lhb{flex:1;padding:10px 6px;border:2px solid var(--border);border-radius:10px;background:none;cursor:pointer;font-size:.78rem;color:var(--text2);display:flex;flex-direction:column;align-items:center;gap:4px}
  .lhb{padding:8px;border-radius:8px}
  .tb.active,.lhb.active{border-color:var(--accent);color:var(--accent)}
  .tic{font-size:1.3rem}
  .fsc{display:flex;align-items:center;gap:12px}
  .fsz{width:36px;height:36px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;color:var(--text);font-size:1rem;display:flex;align-items:center;justify-content:center}
  .fp{flex:1;font-size:var(--fs);font-family:var(--ff)}
  .stb{position:fixed;bottom:80px;right:16px;z-index:90;width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:1rem;box-shadow:0 4px 16px rgba(0,0,0,.2);display:none;align-items:center;justify-content:center}
  .stb.v{display:flex}
  /* 本文スタイル */
  #ebody p{margin-bottom:1em}
  #ebody br+br{display:block;margin:.5em 0;content:""}
  /* ランキング */
  .rk-tab{padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text2);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
  .rk-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .rk-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--surface)}
  .rk-item:active{background:var(--accent-light)}
  .rk-rank{font-size:1.1rem;font-weight:800;min-width:32px;text-align:center;padding-top:2px}
  .rk-rank.top1{color:#f5a623}
  .rk-rank.top2{color:#9b9b9b}
  .rk-rank.top3{color:#c47d3e}
  .rk-body{flex:1;min-width:0}
  .rk-title{font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.4}
  .rk-author{font-size:.72rem;color:var(--text2);margin-bottom:5px}
  .rk-meta{display:flex;gap:8px;font-size:.7rem;color:var(--text3);flex-wrap:wrap}
  /* 進捗バー */
  .prog-wrap{background:var(--bg2);border-radius:8px;padding:10px 14px;margin-bottom:14px}
  .prog-label{font-size:.78rem;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between}
  .prog-bar-bg{background:var(--border);border-radius:10px;height:8px;overflow:hidden}
  .prog-bar{background:var(--accent);height:8px;border-radius:10px;transition:width .4s}
</style>
</head>

// ============================================================
// JSONP helper — CORSを完全回避、なろうAPIのcallback対応を利用
// ============================================================
function jsonpFetch(url, params) {
  return new Promise((resolve, reject) => {
    const cbName = 'nr_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const timer = setTimeout(() => {
      delete window[cbName];
      script.remove();
      reject(new Error('JSONP timeout'));
    }, 15000);

    window[cbName] = (data) => {
      clearTimeout(timer);
      delete window[cbName];
      script.remove();
      resolve(data);
    };

    const p = new URLSearchParams(params);
    p.set('callback', cbName);
    // なろうAPIはHTTPSからのJSONPコール可
    const script = document.createElement('script');
    script.src = url + '?' + p.toString();
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cbName];
      script.remove();
      reject(new Error('Script load error'));
    };
    document.head.appendChild(script);
  });
}

const saveBms  = () => localStorage.setItem('nr_bms',  JSON.stringify(BMS));
const saveCfg  = () => localStorage.setItem('nr_cfg',  JSON.stringify(CFG));

// ============================================================
// Settings
// ============================================================
function applySettings() {
  document.documentElement.setAttribute('data-theme', CFG.th);
  // iframeのスケール調整（基準16px → CFG.fsで拡縮）
  const scale = CFG.fs / 16;
  const iframe = $('reader-iframe');
  if (iframe) {
    iframe.style.transform = `scale(${scale})`;
    iframe.style.width = `${100 / scale}%`;
    iframe.style.height = `${100 / scale}%`;
    const wrap = $('iframe-wrap');
    if (wrap) wrap.style.minHeight = `calc((100vh - 160px) * ${scale})`;
  }
  document.documentElement.style.setProperty('--fs', CFG.fs + 'px');
  document.documentElement.style.setProperty('--lh', CFG.lh);
  document.documentElement.style.setProperty('--ff',
    CFG.fn === 'gothic' ? '"Hiragino Sans","Noto Sans JP",sans-serif'
                        : '"Hiragino Mincho ProN","游明朝",Georgia,serif');
  document.querySelectorAll('.tb').forEach(b => b.classList.toggle('active', b.dataset.th === CFG.th));
  document.querySelectorAll('.lhb[data-lh]').forEach(b => b.classList.toggle('active', parseFloat(b.dataset.lh) === CFG.lh));
  document.querySelectorAll('.lhb[data-fn]').forEach(b => b.classList.toggle('active', b.dataset.fn === (CFG.fn||'serif')));
}

// ============================================================
// Page Nav
// ============================================================
function goPage(id, sv=true) {
  if(sv) prevPage = curPage;
  curPage = id;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $(id)?.classList.add('active');
  document.querySelectorAll('.ni').forEach(n => n.classList.toggle('active', n.dataset.p === id));
  scrollTo(0, 0);
  // 読書ページのみフローティングボタン表示
  const fn = $('float-next');
  if (fn) fn.style.display = id === 'pr' ? 'flex' : 'none';
}
document.querySelectorAll('.ni').forEach(b => b.addEventListener('click', () => {
  if(b.dataset.p === 'pf') renderFavs();
  if(b.dataset.p === 'pk') loadRanking(curRankOrder);
  if(b.dataset.p === 'ph') renderHist();
  goPage(b.dataset.p);
}));

// ============================================================
// Search — JSONP でなろうAPIを直接呼ぶ
// ============================================================
async function doSearch() {
  const kw = $('si').value.trim();
  const g  = $('fg').value;
  const o  = $('fo').value;
  const e  = $('fe').value;
  const l  = $('fl').value;
  $('sr').innerHTML = '<div class="ld"><div class="sp"></div><div>検索中…</div></div>';

  const params = { out:'jsonp', lim:30, order:o, of:'n-t-w-s-k-gl-gf-nu-f-e-l-ga' };
  if(kw) params.word = kw;
  if(g) { params.biggenre = Math.floor(parseInt(g)/100); params.genre = g; }
  if(e === '1') params.end = '1';
  if(e === '0') params.end = '0';
  if(l === 's') { params.minlen = 0; params.maxlen = 50000; }
  if(l === 'm') { params.minlen = 50001; params.maxlen = 200000; }
  if(l === 'l') params.minlen = 200001;

  try {
    const data = await jsonpFetch(API, params);
    if(!Array.isArray(data) || data.length < 2) {
      $('sr').innerHTML = '<div class="em">😢 作品が見つかりませんでした</div>';
      return;
    }
    results = data.slice(1);
    renderList(results, $('sr'));
  } catch(err) {
    $('sr').innerHTML = `<div class="em">⚠️ 読み込みに失敗しました<br><small style="font-size:.72rem;word-break:break-all">${esc(err.message)}</small></div>`;
  }
}
$('sbtn').addEventListener('click', doSearch);
$('si').addEventListener('keydown', e => { if(e.key === 'Enter') doSearch(); });
document.querySelectorAll('.gt').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.gt').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  $('fg').value = t.dataset.g;
  doSearch();
}));

// ============================================================
// タグクリック検索（グローバル関数として定義）
// ============================================================
function searchByKw(kw) {
  $('si').value = kw;
  $('fg').value = '';
  document.querySelectorAll('.gt').forEach(x => x.classList.remove('active'));
  document.querySelector('.gt[data-g=""]').classList.add('active');
  goPage('ps', false);
  doSearch();
}

// ============================================================
// Render List
// ============================================================
function renderList(novels, container) {
  if(!novels?.length) { container.innerHTML = '<div class="em">😢 作品が見つかりませんでした</div>'; return; }
  container.innerHTML = '<div class="nlist">' + novels.map(n => {
    const fav = !!FAVS[n.ncode];
    const kws = (n.keyword||'').split(' ').filter(k=>k).slice(0,5);
    const bm = BMS[n.ncode];
    return `<div class="nc" data-nc="${n.ncode}">
      <div class="nch">
        <div class="nt">${esc(n.title)}</div>
        <button class="fb" onclick="event.stopPropagation();tFav('${n.ncode}',this)">${fav?'❤️':'🤍'}</button>
      </div>
      <div class="na">✍️ ${esc(n.writer)}</div>
      <div class="ns">${esc(n.story||'')}</div>
      <div class="ntags">${kws.map(k=>`<span class="tag stag" onclick="event.stopPropagation();searchByKw('${esc(k)}')">${esc(k)}</span>`).join('')}</div>
      <div class="nm">
        <span>${n.end==1?'<span class="cb">完結</span>':'<span class="wb">連載中</span>'}</span>
        <span>⭐${fmt(n.global_point)}</span>
        <span>📖${fmt(n.general_all_no)}話</span>
        <span>📝${fmt(n.length)}字</span>
        <span>❤️${fmt(n.fav_novel_cnt)}</span>
      </div>
      ${bm ? `<button class="rbtn" style="margin-top:10px;margin-bottom:0;padding:9px;font-size:.82rem" onclick="event.stopPropagation();continueFromCard('${n.ncode}')">🔖 第${bm.ep}話「${esc(bm.title||'')}」から続きを読む</button>` : ''}
    </div>`;
  }).join('') + '</div>';
  container.querySelectorAll('.nc').forEach(c => c.addEventListener('click', () => openDetail(c.dataset.nc)));
}

// しおりから直接読書画面へ
function continueFromCard(nc) {
  const bm = BMS[nc];
  if (!bm) return;
  const n = results.find(x => x.ncode === nc) || FAVS[nc] || getHist().find(x => x.ncode === nc) || { ncode: nc };
  curNovel = n;
  openReader(nc, bm.ep);
}

// ============================================================
// Favs
// ============================================================
function tFav(nc, btn) {
  if(FAVS[nc]) { delete FAVS[nc]; if(btn) btn.textContent = '🤍'; }
  else { FAVS[nc] = results.find(x=>x.ncode===nc) || curNovel || {ncode:nc,title:nc}; if(btn) btn.textContent = '❤️'; }
  saveFavs();
}
function renderFavs() {
  const f = Object.values(FAVS);
  if(!f.length) { $('fl2').innerHTML = '<div class="em">🔖 お気に入りはまだありません</div>'; return; }
  renderList(f, $('fl2'));
}

// ============================================================
// Detail
// ============================================================
async function openDetail(nc) {
  goPage('pd');
  $('db').innerHTML = '<div class="ld"><div class="sp"></div></div>';
  let n = results.find(x=>x.ncode===nc) || FAVS[nc];
  if(!n || !n.story) {
    try {
      const data = await jsonpFetch(API, { out:'jsonp', ncode:nc, of:'n-t-w-s-k-gl-gf-nu-f-e-l-ga' });
      if(data?.length > 1) n = data[1];
    } catch(e) {}
  }
  if(!n) { $('db').innerHTML = '<div class="em">読み込み失敗</div>'; return; }
  curNovel = n;
  addHist(n); // 履歴に追加
  const bm  = BMS[nc];
  const kws = (n.keyword||'').split(' ').filter(k=>k).slice(0,8);
  const tot = n.general_all_no || 1;
  $('dht').textContent = n.title || '';
  const fb = $('dfb');
  fb.textContent = FAVS[nc] ? '❤️' : '🤍';
  fb.onclick = () => { tFav(nc, null); fb.textContent = FAVS[nc] ? '❤️' : '🤍'; };
  $('db').innerHTML = `
    <div class="dt">${esc(n.title||'')}</div>
    <div class="dau">✍️ ${esc(n.writer||'')}</div>
    <div class="dbadge">
      ${n.end==1?'<span class="cb">✅ 完結</span>':'<span class="wb">📝 連載中</span>'}
      <span class="tag stag" data-genre="${n.genre}">${esc(GM[String(n.genre)]||'')}</span>
    </div>
    <div class="dsum">${esc(n.story||'')}</div>
    <div class="dstats">
      <div class="sb"><div class="sn">${fmt(n.global_point)}</div><div class="sl">総合ポイント</div></div>
      <div class="sb"><div class="sn">${fmt(tot)}</div><div class="sl">話数</div></div>
      <div class="sb"><div class="sn">${fmt(n.fav_novel_cnt)}</div><div class="sl">お気に入り</div></div>
    </div>
    <div class="dtags">${kws.map(k=>`<span class="tag stag" data-kw="${esc(k)}">${esc(k)}</span>`).join('')}</div>
    <button class="rbtn" id="brc">${bm ? `📖 第${bm.ep}話から続きを読む` : '📖 第1話から読む'}</button>
    ${bm ? '<button class="rbtn rbtn2" id="br1">最初から読む</button>' : ''}
    <div class="elt">📋 話一覧（${tot}話）</div>
    <div class="ejump">
      <input type="number" id="eji" placeholder="話番号でジャンプ（例: 50）" min="1" max="${tot}">
      <button id="ejb">Go</button>
    </div>
    <div id="elc"><div class="ld"><div class="sp" style="width:24px;height:24px"></div></div></div>
  `;
  $('brc').onclick = () => openReader(nc, bm ? bm.ep : 1);

  // 進捗バーを動的に追加
  if (bm && bm.ep > 0) {
    const pct = Math.round(bm.ep / tot * 100);
    const progHtml = `<div class="prog-wrap">
      <div class="prog-label"><span>📖 読書進捗</span><span>${bm.ep} / ${tot}話（${pct}%）</span></div>
      <div class="prog-bar-bg"><div class="prog-bar" style="width:${pct}%"></div></div>
    </div>`;
    const tagsEl = $('db').querySelector('.dtags');
    if (tagsEl) tagsEl.insertAdjacentHTML('afterend', progHtml);
  }
  // タグクリックで検索
  document.querySelectorAll('.stag').forEach(t => {
    t.addEventListener('click', () => {
      if (t.dataset.kw) {
        $('si').value = t.dataset.kw;
        $('fg').value = '';
        document.querySelectorAll('.gt').forEach(x => x.classList.remove('active'));
        document.querySelector('.gt[data-g=""]').classList.add('active');
        goPage('ps', false);
        doSearch();
      } else if (t.dataset.genre) {
        $('si').value = '';
        $('fg').value = t.dataset.genre;
        document.querySelectorAll('.gt').forEach(x => x.classList.remove('active'));
        const gt = document.querySelector(`.gt[data-g="${t.dataset.genre}"]`);
        if (gt) gt.classList.add('active');
        goPage('ps', false);
        doSearch();
      }
    });
  });
  $('br1')?.addEventListener('click', () => openReader(nc, 1));
  const jmp = () => { const v = parseInt($('eji').value); if(v>=1 && v<=tot) openReader(nc, v); };
  $('ejb').onclick = jmp;
  $('eji').addEventListener('keydown', e => { if(e.key==='Enter') jmp(); });
  loadEpList(nc, tot);
}
$('dbk').addEventListener('click', () => {
  // 検索かお気に入りページに戻る（詳細→詳細ループを防ぐ）
  const dest = (prevPage === 'pd' || prevPage === 'pr') ? 'ps' : (prevPage || 'ps');
  goPage(dest);
});

// ============================================================
// Episode list
// ============================================================
async function loadEpList(nc, tot) {
  const c = $('elc'); if(!c) return;
  epList = Array.from({length: tot}, (_, i) => ({num: i+1, title: `第${i+1}話`}));
  const bm = BMS[nc];
  const render = () => {
    c.innerHTML = '<div class="elist">' + epList.slice(0,100).map(e =>
      `<div class="ei${bm&&bm.ep===e.num?' cur':''}" data-ep="${e.num}">
        <span><span class="enum">${e.num}話</span>${esc(e.title)}</span>
        ${bm&&bm.ep===e.num ? '<span style="font-size:.7rem">📖</span>' : ''}
      </div>`
    ).join('') + '</div>' +
    (epList.length > 100 ? `<div style="padding:10px;text-align:center;font-size:.78rem;color:var(--text3)">他${epList.length-100}話は番号入力でジャンプ</div>` : '');
    c.querySelectorAll('.ei').forEach(i => i.addEventListener('click', () => openReader(nc, parseInt(i.dataset.ep))));
  };
  render();
  // バックグラウンドで話タイトルを取得
  try {
    const url = `https://ncode.syosetu.com/${nc.toLowerCase()}/`;
    const res = await fetch(HPRX + encodeURIComponent(url), {signal: AbortSignal.timeout(10000)});
    if(!res.ok) throw 0;
    const json2 = await res.json();
    const doc = new DOMParser().parseFromString(json2.contents, 'text/html');
    const links = doc.querySelectorAll('.novel_sublist2 .subtitle a, .index_box .subtitle a');
    if(links.length) {
      links.forEach(a => {
        const m = (a.getAttribute('href')||'').match(/\/(\d+)\/?$/);
        if(m) { const ep = epList.find(x => x.num===parseInt(m[1])); if(ep) ep.title = a.textContent.trim(); }
      });
      render();
    }
  } catch(e) {}
}

// ============================================================
// Reader — iframeでなろう本文を直接表示
// ============================================================
function openReader(nc, ep) {
  goPage('pr');
  curNovel = curNovel || {ncode: nc};
  curEp = ep;
  $('rtit').textContent = curNovel.title || nc;
  const info  = epList.find(e => e.num === ep);
  const title = info?.title || `第${ep}話`;
  // しおりはバーに現在話を表示するが自動保存はしない
  $('bbar').textContent = `📖 第${curEp}話（🔖でしおりを挟む）`;
  updNav(ep);
  const url = `https://ncode.syosetu.com/${nc.toLowerCase()}/${ep}/`;
  $('reader-iframe').src = url;
  $('ropenext').onclick = () => window.open(url, '_blank');
  // スワイプヒント用イベント（初回のみ）
  document.dispatchEvent(new Event('nr-reader-open'));
}
function updNav(ep) {
  const tot = epList.length || curNovel?.general_all_no || 1;
  totalEp = tot;
  $('eind').textContent = `${ep} / ${tot}`;
  $('bprev').disabled = ep <= 1;
  $('bnext').disabled = ep >= tot;
}
$('bprev').addEventListener('click', () => { if(curEp > 1) openReader(curNovel.ncode, curEp-1); });
$('float-next').addEventListener('click', () => { if(curEp < totalEp) openReader(curNovel.ncode, curEp+1); });
$('bnext').addEventListener('click', () => { if(curEp < totalEp) openReader(curNovel.ncode, curEp+1); });
$('rbk').addEventListener('click', () => goPage('pd', false));

// しおりボタン：今読んでいる話を手動で記録
$('btnBookmark').addEventListener('click', () => {
  if (!curNovel) return;
  const nc = curNovel.ncode;
  const info = epList.find(e => e.num === curEp);
  const title = info?.title || `第${curEp}話`;
  BMS[nc] = { ep: curEp, title }; saveBms();
  // ボタンを一瞬光らせてフィードバック
  const btn = $('btnBookmark');
  btn.textContent = '✅';
  btn.style.color = 'var(--accent)';
  setTimeout(() => { btn.textContent = '🔖'; btn.style.color = ''; }, 1200);
  $('bbar').textContent = `📖 しおり：${title}`;
  // トースト表示
  showToast(`🔖 第${curEp}話にしおりを挟みました`);
});

// しおりバーをタップでその話へジャンプ
$('bbar').addEventListener('click', () => {
  if (!curNovel) return;
  const bm = BMS[curNovel.ncode];
  if (bm && bm.ep !== curEp) {
    openReader(curNovel.ncode, bm.ep);
  }
});

// ============================================================
// スワイプで前後の話に移動
// ============================================================
(function() {
  let tx = 0, ty = 0, swiping = false;
  const wrap = document.getElementById('iframe-wrap');
  const hint = document.getElementById('swipe-hint');
  let hintTimer = null;

  function showHint() {
    hint.style.opacity = '1';
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => hint.style.opacity = '0', 1500);
  }

  wrap.addEventListener('touchstart', e => {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    swiping = false;
  }, {passive: true});

  wrap.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - tx;
    const dy = e.touches[0].clientY - ty;
    // 横方向の動きが縦より大きい場合だけスワイプと判定
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
      swiping = true;
    }
  }, {passive: true});

  wrap.addEventListener('touchend', e => {
    if (!swiping) return;
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) < 60) return; // 60px未満は無視
    if (dx < 0 && curEp < totalEp) {
      // 左スワイプ → 次の話
      openReader(curNovel.ncode, curEp + 1);
      showHint();
    } else if (dx > 0 && curEp > 1) {
      // 右スワイプ → 前の話
      openReader(curNovel.ncode, curEp - 1);
      showHint();
    }
    swiping = false;
  }, {passive: true});

  // 初回表示時にヒントを出す
  const _orig = window.openReader;
  // 初回だけヒント表示
  let hinted = false;
  document.getElementById('bprev').addEventListener('click', () => {});
  document.addEventListener('nr-reader-open', () => {
    if (!hinted) { hinted = true; showHint(); }
  });
})();

// ============================================================
// History（閲覧履歴）
// ============================================================
const HIST_KEY = 'nr_hist';
function getHist() { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); }
function saveHist(h) { localStorage.setItem(HIST_KEY, JSON.stringify(h)); }

function addHist(novel) {
  if (!novel || !novel.ncode) return;
  let h = getHist();
  // 既存を削除してから先頭に追加
  h = h.filter(x => x.ncode !== novel.ncode);
  h.unshift({ ncode: novel.ncode, title: novel.title, writer: novel.writer, genre: novel.genre, end: novel.end, general_all_no: novel.general_all_no, fav_novel_cnt: novel.fav_novel_cnt, global_point: novel.global_point, story: novel.story, keyword: novel.keyword, viewedAt: Date.now() });
  if (h.length > 50) h = h.slice(0, 50);
  saveHist(h);
}

function renderHist() {
  const h = getHist();
  const el = $('hist-list');
  if (!h.length) { el.innerHTML = '<div class="em">📖 まだ履歴がありません</div>'; return; }
  renderList(h, el);
}

$('hist-clear').addEventListener('click', () => {
  if (confirm('履歴をすべて削除しますか？')) {
    saveHist([]);
    renderHist();
  }
});

let curRankOrder = 'dailypoint';

async function loadRanking(order) {
  curRankOrder = order;
  const el = $('rk-list');
  el.innerHTML = '<div class="ld"><div class="sp"></div><div>読み込み中…</div></div>';
  const params = { out:'jsonp', lim:30, order, of:'n-t-w-s-k-gl-gf-nu-f-e-l-ga' };
  try {
    const data = await jsonpFetch(API, params);
    if(!Array.isArray(data) || data.length < 2) {
      el.innerHTML = '<div class="em">😢 読み込み失敗</div>'; return;
    }
    const novels = data.slice(1);
    el.innerHTML = novels.map((n, i) => {
      const rank = i + 1;
      const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
      const rankLabel = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
      const kws = (n.keyword||'').split(' ').filter(k=>k).slice(0,3);
      return `<div class="rk-item" data-nc="${n.ncode}">
        <div class="rk-rank ${rankClass}">${rankLabel}</div>
        <div class="rk-body">
          <div class="rk-title">${esc(n.title)}</div>
          <div class="rk-author">✍️ ${esc(n.writer)}</div>
          <div class="rk-meta">
            <span>${n.end==1?'<span class="cb">完結</span>':'<span class="wb">連載中</span>'}</span>
            <span>⭐${fmt(n.global_point)}</span>
            <span>📖${fmt(n.general_all_no)}話</span>
            <span>❤️${fmt(n.fav_novel_cnt)}</span>
          </div>
          <div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:3px">${kws.map(k=>`<span class="tag" style="font-size:.65rem">${esc(k)}</span>`).join('')}</div>
        </div>
      </div>`;
    }).join('');
    el.querySelectorAll('.rk-item').forEach(item => {
      item.addEventListener('click', () => {
        // 検索結果にも追加しておく
        const n = novels.find(x => x.ncode === item.dataset.nc);
        if(n && !results.find(x => x.ncode === n.ncode)) results.push(n);
        openDetail(item.dataset.nc);
      });
    });
  } catch(err) {
    el.innerHTML = `<div class="em">⚠️ 読み込み失敗<br><small>${esc(err.message)}</small></div>`;
  }
}

document.querySelectorAll('.rk-tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.rk-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    loadRanking(t.dataset.rk);
  });
});

// ============================================================
// Toast
// ============================================================
function showToast(msg) {
  let t = $('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;font-size:.82rem;padding:8px 18px;border-radius:20px;z-index:500;pointer-events:none;transition:opacity .3s;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2000);
}

// ============================================================
// Init
// ============================================================
applySettings();
$('fg').value = '201';
doSearch();
</script>
